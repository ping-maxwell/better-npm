name = "better-npm-registry"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
UPSTREAM_REGISTRY = "https://registry.npmjs.org"
REGISTRY_URL = "https://registry.better-npm.dev"
WEB_APP_URL = "https://better-npm.dev"

[[d1_databases]]
binding = "DB"
database_name = "better-npm"
database_id = "ab12aaa3-949a-4ea6-ab94-51ca0dbe5941"

[[r2_buckets]]
binding = "TARBALLS"
bucket_name = "better-npm-tarballs"

[[kv_namespaces]]
binding = "AUTH_CACHE"
id = "85cec485482f43cbb69503c8ca729975"
preview_id = "85cec485482f43cbb69503c8ca729975"

[triggers]
crons = ["*/1 * * * *"]

# ── Production overrides ────────────────────────────────────────────
# Uncomment and fill in after creating CF resources:
#
# [env.production.vars]
# UPSTREAM_REGISTRY = "https://registry.npmjs.org"
#
# [[env.production.d1_databases]]
# binding = "DB"
# database_name = "better-npm"
# database_id = "<your-d1-id>"
#
# [[env.production.r2_buckets]]
# binding = "TARBALLS"
# bucket_name = "better-npm-tarballs"
#
# [[env.production.queues.producers]]
# binding = "REVIEW_QUEUE"
# queue = "better-npm-reviews"
#
# [[env.production.queues.consumers]]
# queue = "better-npm-reviews"
# max_batch_size = 5
# max_batch_timeout = 10

[observability]
[observability.logs]
enabled = true
invocation_logs = true